<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome</title>
  </head>
  <body>
    <h1>Welcome to your new fbr project!</h1>
    <p>
      This is a simple template to get you started with file-based routing in Express and TypeScript. You can start the development server with <code>npm run dev</code> and build the project with <code>npm run build</code>.
    </p>
    <button onclick="checkHealth()">Check Health</button>
    <script>
      async function checkHealth() {
        const response = await fetch('/health');
        const data = await response.json();
        alert(`Status: ${data.status}\nMessage: ${data.message}`);
      }
    </script>
  </body>
</html>
